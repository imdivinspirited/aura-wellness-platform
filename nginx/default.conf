# Production HTTPS: use a separate server block on 443 with ssl_certificate / ssl_certificate_key,
# then add security headers at the edge, e.g.:
#   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
# WAF / DDoS: configure at your CDN (Cloudflare, CloudFront, Fastly) or cloud load balancer.

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compression (static + SPA)
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml
    font/woff
    font/woff2;

  # Cache fingerprinted build assets aggressively (Vite outputs hashed filenames under /assets).
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Optional: proxy API from same origin (uncomment if you serve backend on same host)
  # location /api/ {
  #   proxy_pass http://backend:3000/api/;
  #   proxy_http_version 1.1;
  #   proxy_set_header Host $host;
  #   proxy_set_header X-Real-IP $remote_addr;
  #   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #   proxy_set_header X-Forwarded-Proto $scheme;
  # }
}

