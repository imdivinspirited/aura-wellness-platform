    <!-- Load fonts non-render-blocking via JS injection -->
    <script>
      requestAnimationFrame(function () {
        var f1 = document.createElement('link');
        f1.rel = 'stylesheet';
        f1.href = 'https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap';
        document.head.appendChild(f1);
        var f2 = document.createElement('link');
        f2.rel = 'stylesheet';
        f2.href =

    <style>

        padding: 0 !important;

        border: 0 !important;
      }
      .skip-link:focus,
      .skip-link:focus-visible {
        position: fixed !important;
        left: 0.75rem !important;
        top: 0.75rem !important;
        z-index: 2147483647 !important;
        width: auto !important;
        height: auto !important;
        margin: 0 !important;
        padding: 0.75rem 1.25rem !important;
        overflow: visible !important;
        clip: auto !important;
        clip-path: none !important;
        white-space: normal !important;
