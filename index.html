<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Art of Living Bangalore Ashram | Meditation, Yoga & Wellness Programs</title>
    <meta name="title" content="Art of Living Bangalore Ashram | Meditation, Yoga & Wellness Programs" />
    <meta name="description" content="Experience transformative yoga, meditation, and breathing programs at Art of Living Bangalore Ashram. Join millions worldwide in discovering inner peace and holistic well-being." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://artofliving.org/" />
    <meta property="og:title" content="Art of Living Bangalore Ashram | Meditation, Yoga & Wellness" />
    <meta property="og:description" content="Experience transformative yoga, meditation, and breathing programs. Join millions worldwide in discovering inner peace." />
    <meta property="og:image" content="/og-image.jpg" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://artofliving.org/" />
    <meta property="twitter:title" content="Art of Living Bangalore Ashram | Meditation, Yoga & Wellness" />
    <meta property="twitter:description" content="Experience transformative yoga, meditation, and breathing programs. Join millions worldwide in discovering inner peace." />
    
    <!-- Keywords -->
    <meta name="keywords" content="Art of Living, Bangalore Ashram, meditation, yoga, Sudarshan Kriya, wellness, spiritual retreat, Sri Sri Ravi Shankar, stress relief, happiness program" />
    
    <!-- Canonical -->
    <link rel="canonical" href="https://artofliving.org/" />
    
    <!-- Preconnect to Google Fonts & CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.gpteng.co" crossorigin />
    
    <!-- Preload critical font files to break dependency chain -->
    <link rel="preload" href="https://fonts.gstatic.com/s/inter/v20/UcC73FwrK3iLTeHuS_nVMrMxCp50SjIa0ZL7W0Q5n-wU.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="https://fonts.gstatic.com/s/playfairdisplay/v40/nuFiD-vYSZviVYUb_rj3ij__anPXDTzYgEM86xQ.woff2" as="font" type="font/woff2" crossorigin />
    
    <!-- Preload hero image to reduce LCP - responsive -->
    <link rel="preload" href="/images/hero/hero_landing_ashram_mobile.jpg" as="image" fetchpriority="high" media="(max-width: 768px)" />
    <link rel="preload" href="/images/hero/hero_landing_ashram.jpg" as="image" fetchpriority="high" media="(min-width: 769px)" />
    
    <!-- Load fonts non-render-blocking via JS injection -->
    <script>
      requestAnimationFrame(function(){
        var f1=document.createElement('link');f1.rel='stylesheet';f1.href='https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap';document.head.appendChild(f1);
        var f2=document.createElement('link');f2.rel='stylesheet';f2.href='https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap';document.head.appendChild(f2);
      });
    </script>
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    </noscript>
  </head>
  <body>
    <main id="root">
      <!-- Inline skeleton for instant FCP before React mounts -->
      <div id="initial-loader" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#faf8f5;">
        <div style="text-align:center;">
          <div style="width:40px;height:40px;border:3px solid #c4956a;border-top-color:transparent;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 16px;"></div>
          <p style="font-family:system-ui,sans-serif;color:#8b7355;font-size:14px;margin:0;">Loading...</p>
        </div>
      </div>
      <style>@keyframes sp{to{transform:rotate(360deg)}}</style>
    </main>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
